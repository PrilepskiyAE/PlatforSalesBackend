databaseChangeLog:
  - changeSet:
      id: create-table-users
      author: sonya-the-demoness
      changes:
        - createTable:
            tableName: table_users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

  - changeSet:
      id: index-username-on-table_users
      author: sonya-the-demoness
      changes:
        - createIndex:
            tableName: table_users
            columns:
              - column:
                  name: username
                  type: normal
