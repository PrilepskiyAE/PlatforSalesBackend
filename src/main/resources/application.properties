spring.application.name=company_platform

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:platform_db}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:astonpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.contexts=dev

#spring.sql.init.mode=always
logging.level.org.liquibase=DEBUG
logging.level.liquibase=DEBUG
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG
server.port=8081

jwt.
jwt.expiration=86400000

spring.web.resources.static-locations=classpath:/static/,classpath:/public/